<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>办公室统一领导时间统筹系统｜内部专用</title>
    <!-- 替换失效依赖，修复link dead报错 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",system-ui}
        body{background:#f5f7fa;padding:12px;font-size:15px}
        .card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px #00000012}
        .btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:15px;margin:6px 0}
        .btn-blue{background:#1677ed;color:#fff}
        .btn-green{background:#00b42a;color:#fff}
        .btn-orange{background:#ff7d00;color:#fff}
        .btn-red{background:#f53f3f;color:#fff}
        input,select,textarea{width:100%;padding:10px;border:1px solid #e5e6eb;border-radius:8px;margin:8px 0;font-size:15px}
        .tab{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px}
        .tab button{padding:10px;border:none;border-radius:6px;background:#e5e6eb}
        .tab button.active{background:#1677ed;color:#fff}
        .panel{display:none}
        .panel.show{display:block}
        .tip{font-size:14px;color:#666;margin:4px 0}
        .hide{display:none}
        /* 办公室15天大屏时间表样式（半小时为单位） */
        .schedule-table{width:100%;overflow:auto;border-collapse:collapse;font-size:12px}
        .schedule-table th,.schedule-table td{border:1px solid #ddd;padding:6px;text-align:center;white-space:nowrap}
        .free{background:#edf2ff;color:#000}
        .busy{background:#fef0f0;color:#b00}
        .my-tooltip{position:relative}
        .my-tooltip:hover::after{content:attr(data-tip);position:absolute;left:0;top:120%;background:#222;color:#fff;padding:6px;border-radius:4px;z-index:999;width:220px;text-align:left}
        /* 适配手机端表格滚动 */
        #bigTableBox{overflow-x:auto;}
    </style>
</head>
<body>
<h3 style="text-align:center;margin:10px 0">🏢 综合办公室 · 领导时间统一统筹平台</h3>

<!-- 顶部角色入口 -->
<div class="card">
    <div>🔐 当前身份：<span id="roleText">未登录</span></div>
    <button class="btn btn-blue" onclick="openLogin()">点击登录对应身份入口</button>
</div>

<!-- 顶部标签页 -->
<div class="tab">
    <button class="tab-btn active" data-target="p1">行程上报</button>
    <button class="tab-btn" data-target="p2">我的申请记录</button>
    <button class="tab-btn" data-target="p3" id="admTab1" style="display:none">后台审核</button>
    <button class="tab-btn" data-target="p4" id="admTab2" style="display:none">15天全局时间表</button>
</div>

<!-- 1. 全员：上报行程、预约领导 -->
<div id="p1" class="panel show">
    <div class="card">
        <h4>📝 部门/领导 统一报事预约（必须经办公室审核）</h4>
        <input type="text" id="applyDept" placeholder="报送部门 / 本人姓名">
        <input type="text" id="applyTitle" placeholder="活动事由、会议主题、外出走访内容">
        <select id="applyLeader">
            <option value="">选择需要协调的领导</option>
            <option value="张书记">张书记</option>
            <option value="王局长">王局长</option>
            <option value="李分管">李分管</option>
            <option value="赵主任">赵主任</option>
        </select>
        <input type="date" id="applyDate">
        <input type="time" id="applyStart">
        <input type="time" id="applyEnd">
        <textarea id="applyRemark" placeholder="详细说明、是否公务、是否必须领导到场"></textarea>
        <button class="btn btn-green" onclick="submitApply()">提交到办公室等待研判</button>
    </div>

    <!-- 领导专用：自己填私人行程 + 一键呼叫办公室 -->
    <div class="card" id="leaderOnlyBox" style="display:none;border:2px solid #00b42a">
        <h4>👤 领导专属：自主填报个人固定行程</h4>
        <input type="text" id="leaderSelfEvent" placeholder="本人固定安排：值班、调研、会客、学习">
        <input type="date" id="leaderSelfDate">
        <input type="time" id="leaderSelfStart">
        <input type="time" id="leaderSelfEnd">
        <button class="btn btn-orange" onclick="leaderAddSelfPlan()">自行登记，同步给办公室</button>
        <button class="btn btn-blue" onclick="callOfficeHelp()">📞 一键呼叫办公室代我录入公务</button>
    </div>
</div>

<!-- 2. 个人记录（部门仅看自身，领导看自己） -->
<div id="p2" class="panel">
    <div class="card">
        <h4>📋 本人所有报送记录、审核结果查询</h4>
        <div id="myListBox"></div>
    </div>
</div>

<!-- 3. 办公室后台审核（仅管理员可见） -->
<div id="p3" class="panel">
    <div class="card">
        <h4>⚙️ 办公室后台：统一研判、安排或退回</h4>
        <div class="tip">规则：看15天表格，有空就过，没空直接退回写理由</div>
        <div id="auditBox"></div>
        <hr>
        <button class="btn btn-blue" onclick="exportAllLog()">📊 导出全量行程台账（归档备查）</button>
    </div>
</div>

<!-- 4. 办公室专属：15天全局时间表（核心大屏，半小时为单位） -->
<div id="p4" class="panel">
    <div class="card">
        <h4>📅 领导15天全域空闲总表（仅办公室可看）</h4>
        <div class="tip">蓝色=空闲可安排 红色=已占用 长按查看占用详情（半小时为单位）</div>
        <div id="bigTableBox" style="overflow:auto"></div>
    </div>
</div>

<script>
// ========== 全局基础配置 ==========
const ADMIN_PASSWORD = "office6688"; // 办公室登录密码，你随时改
let nowRole = ""; // admin / dept / leader
const leaderArr = ["张书记","王局长","李分管","赵主任"];
// 半小时为单位，设置全天时间段（覆盖工作时间）
const timeSlotArr = [
    "08:00-08:30", "08:30-09:00", "09:00-09:30", "09:30-10:00",
    "10:00-10:30", "10:30-11:00", "11:00-11:30", "11:30-12:00",
    "14:00-14:30", "14:30-15:00", "15:00-15:30", "15:30-16:00",
    "16:00-16:30", "16:30-17:00", "17:00-17:30"
];

// 本地数据库读写
function getDb(){return JSON.parse(localStorage.getItem("planDb")||"[]")}
function saveDb(d){localStorage.setItem("planDb",JSON.stringify(d))}

// 标签切换（修复跳转异常，身份选择后正常显示对应内容）
document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));
        document.getElementById(btn.dataset.target).classList.add("show");
        // 身份选择后，切换标签同步刷新对应内容
        if(btn.dataset.target === "p2"){
            loadMyList();
        }else if(btn.dataset.target === "p3" && nowRole === "admin"){
            refreshAudit();
        }else if(btn.dataset.target === "p4" && nowRole === "admin"){
            renderBigTable();
        }
    }
})

// ========== 身份登录系统（权限锁死，修复跳转异常） ==========
function openLogin(){
    let s = prompt("请选择身份：\n1=综合办公室(最高权限)\n2=部门报送人员\n3=在岗领导本人");
    if(s==="1"){
        let pwd = prompt("请输入办公室管理密码");
        if(pwd===ADMIN_PASSWORD){
            nowRole="admin";
            document.getElementById("roleText").innerText="✅ 综合办公室（全权管控）";
            document.getElementById("admTab1").style.display="block";
            document.getElementById("admTab2").style.display="block";
            // 登录后自动刷新办公室相关内容，避免跳转异常
            refreshAudit();
            renderBigTable();
            // 切换到默认面板，避免内容空白
            document.querySelectorAll(".tab-btn")[0].click();
        }else alert("密码错误，不是办公室人员");
    }else if(s==="2"){
        nowRole="dept";
        document.getElementById("roleText").innerText="📎 业务部门（仅可上报）";
        // 登录后加载自身申请记录，避免跳转异常
        loadMyList();
        document.querySelectorAll(".tab-btn")[0].click();
    }else if(s==="3"){
        nowRole="leader";
        document.getElementById("roleText").innerText="👤 在岗领导（自填行程）";
        document.getElementById("leaderOnlyBox").style.display="block";
        // 登录后加载自身记录，避免跳转异常
        loadMyList();
        document.querySelectorAll(".tab-btn")[0].click();
    }else{
        alert("选择错误");
    }
}

// ========== 部门全员：提交预约上报（弹窗修改为指定内容） ==========
function submitApply(){
    if(nowRole===""){alert("请先登录身份再上报");return}
    let d = getDb();
    let obj = {
        id:Date.now(),
        role:nowRole,
        dept:document.getElementById("applyDept").value,
        title:document.getElementById("applyTitle").value,
        leader:document.getElementById("applyLeader").value,
        date:document.getElementById("applyDate").value,
        st:document.getElementById("applyStart").value,
        et:document.getElementById("applyEnd").value,
        remark:document.getElementById("applyRemark").value,
        status:"pending",
        reply:""
    };
    if(!obj.dept||!obj.title||!obj.leader||!obj.date){alert("必填项不能为空");return}
    d.push(obj);saveDb(d);
    // 弹窗修改为用户要求的内容
    alert("已报送综合办公室，等待同意研判。");
    // 清空表单，方便重新提交
    document.getElementById("applyDept").value = "";
    document.getElementById("applyTitle").value = "";
    document.getElementById("applyLeader").value = "";
    document.getElementById("applyDate").value = "";
    document.getElementById("applyStart").value = "";
    document.getElementById("applyEnd").value = "";
    document.getElementById("applyRemark").value = "";
}

// ========== 领导专用：自己登记固定行程 ==========
function leaderAddSelfPlan(){
    if(nowRole!=="leader"){alert("仅限领导本人操作");return}
    let d=getDb();
    let leaderName = prompt("请确认您的姓名（与系统领导名单一致）：");
    if(!leaderArr.includes(leaderName)){alert("姓名错误，未找到该领导");return}
    let obj={
        id:Date.now(),
        role:"leader",
        dept:leaderName+"（领导本人自主登记）",
        title:document.getElementById("leaderSelfEvent").value,
        leader:leaderName,
        date:document.getElementById("leaderSelfDate").value,
        st:document.getElementById("leaderSelfStart").value,
        et:document.getElementById("leaderSelfEnd").value,
        remark:"领导私人固定行程，优先锁定",
        status:"adminPass",
        reply:"系统自动锁定，办公室已备案"
    };
    d.push(obj);saveDb(d);
    alert("✅ 行程已同步办公室，全局时间自动锁死");
    // 清空表单
    document.getElementById("leaderSelfEvent").value = "";
    document.getElementById("leaderSelfDate").value = "";
    document.getElementById("leaderSelfStart").value = "";
    document.getElementById("leaderSelfEnd").value = "";
}

// 领导一键呼叫办公室
function callOfficeHelp(){
    alert("📞 已发起呼叫，请直接电话联系办公室内勤，协助你统一录入公务安排");
}

// ========== 办公室后台：审核、通过、退回 ==========
function refreshAudit(){
    if(nowRole!=="admin")return;
    let d=getDb();
    let html="";
    d.forEach(item=>{
        let statTxt = item.status==="pending"?"🔴待研判":item.status==="adminPass"?"🟢已安排":"🟡已退回";
        html += `
        ${item.title}报送：${item.dept}涉及领导：${item.leader||"无"}时间：${item.date} ${item.st}-${item.et}状态：${statTxt}
            ${item.status==="pending"?`
            
            `:"办公室回复：${item.reply}"}
        
        `
    });
    document.getElementById("auditBox").innerHTML=html;
}
function auditPass(id){
    let d=getDb();
    let o=d.find(x=>x.id===id);
    o.status="adminPass";o.reply="办公室研判：领导时间空闲，统一安排到场";
    saveDb(d);refreshAudit();renderBigTable();
    alert("✅ 已正式排入领导日程，自动同步全域时间表");
}
function auditReject(id){
    let d=getDb();
    let o=d.find(x=>x.id===id);
    let r=document.getElementById("reply"+id).value;
    o.status="reject";o.reply="办公室退回理由："+r;
    saveDb(d);refreshAudit();renderBigTable();
    alert("❌ 已退回报送部门，对方会看到原因");
}

// ========== 核心功能：办公室15天全局时间表（半小时为单位，带悬浮详情） ==========
function renderBigTable(){
    if(nowRole!=="admin")return;
    let d=getDb();
    // 生成未来15天日期
    let dayList=[];
    for(let i=0;i<15;i++){
        let t=new Date();t.setDate(t.getDate()+i);
        dayList.push(t.toISOString().slice(0,10));
    }
    // 构建表格（表头：领导 + 15天 + 每个时间段）
    let html=`
    领导\日期
                ${dayList.map(day=>`
